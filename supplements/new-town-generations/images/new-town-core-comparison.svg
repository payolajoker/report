<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720">
  <rect width="1500" height="720" fill="#f5f3ed"/>
  <style>
    .title { font: 700 40px 'Malgun Gothic', sans-serif; fill: #203027; }
    .sub { font: 500 20px 'Malgun Gothic', sans-serif; fill: #4a5a50; }
    .head { font: 700 26px 'Malgun Gothic', sans-serif; fill: #ffffff; }
    .cellh { font: 700 24px 'Malgun Gothic', sans-serif; fill: #203027; }
    .cell { font: 500 19px 'Malgun Gothic', sans-serif; fill: #33443a; }
  </style>
  <text x="750" y="60" text-anchor="middle" class="title">1기·2기·3기 신도시 핵심 비교 도식</text>
  <text x="750" y="96" text-anchor="middle" class="sub">문서의 핵심 비교표를 도식화해 세대별 차이를 한 장에서 읽도록 정리한 요약판</text>
  <rect x="80" y="125" width="1340" height="72" rx="18" fill="#234b3d"/>
  <text x="220" y="170" text-anchor="middle" class="head">항목</text>
  <text x="555" y="170" text-anchor="middle" class="head">1기</text>
  <text x="870" y="170" text-anchor="middle" class="head">2기</text>
  <text x="1185" y="170" text-anchor="middle" class="head">3기</text>
  <g><rect x="80" y="220" width="1340" height="78" rx="18" fill="#dce8f8"/><text x="220" y="267" text-anchor="middle" class="cellh">핵심 문제</text><text x="555" y="267" text-anchor="middle" class="cell">서울 주택난 해소와 과밀 분산</text><text x="870" y="267" text-anchor="middle" class="cell">주택공급 지속 + 교통체계 구축</text><text x="1185" y="267" text-anchor="middle" class="cell">주택공급 + 서울 접근성 + 광역생활권 재편</text></g>
  <g><rect x="80" y="315" width="1340" height="78" rx="18" fill="#dfeccc"/><text x="220" y="362" text-anchor="middle" class="cellh">도시 성격</text><text x="555" y="362" text-anchor="middle" class="cell">외곽 대규모 주거지 중심</text><text x="870" y="362" text-anchor="middle" class="cell">권역별 기능분담형 신도시</text><text x="1185" y="362" text-anchor="middle" class="cell">광역교통 결절형·일자리 거점형</text></g>
  <g><rect x="80" y="410" width="1340" height="78" rx="18" fill="#f3e2c7"/><text x="220" y="457" text-anchor="middle" class="cellh">대표 해석</text><text x="555" y="457" text-anchor="middle" class="cell">공급 중심의 초기 외곽 신도시</text><text x="870" y="457" text-anchor="middle" class="cell">공급과 교통·자족의 결합 단계</text><text x="1185" y="457" text-anchor="middle" class="cell">수도권 구조 자체를 재편하는 장치</text></g>
  <g><rect x="80" y="505" width="1340" height="78" rx="18" fill="#eadff4"/><text x="220" y="552" text-anchor="middle" class="cellh">현재 국면</text><text x="555" y="552" text-anchor="middle" class="cell">노후계획도시 정비</text><text x="870" y="552" text-anchor="middle" class="cell">정주여건·교통 개선 지속</text><text x="1185" y="552" text-anchor="middle" class="cell">조성 진행 + 광역교통 선반영</text></g>
</svg>